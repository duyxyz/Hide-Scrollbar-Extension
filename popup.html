<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollHide</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/switch.css">
  <link rel="stylesheet" href="css/notices.css">
  <link rel="stylesheet" href="css/whitelist.css">
</head>

<body>
  <div class="header">
    <h1 data-i18n="title">I don't like scrollbar</h1>
    <label class="switch">
      <input type="checkbox" id="toggleScroll" aria-label="Toggle hiding scrollbar">
      <span class="slider"></span>
    </label>
  </div>

  <div id="restrictedNotice" class="restricted-notice" data-i18n="restrictedNotice">
    Extension can't work on this page
  </div>

  <div id="whitelistedNotice" class="whitelisted-notice" data-i18n="whitelistedNotice">
    This site is in the exception list
  </div>

  <div class="section-title">
    <span data-i18n="exceptionsTitle">Exceptions</span>
    <span id="exceptionCount" class="exception-count"></span>
  </div>
  <button id="addCurrentBtn" class="add-current-btn" data-i18n="addCurrentSite">Add current site</button>

  <textarea id="whitelistTextarea" class="whitelist-textarea" spellcheck="false"></textarea>

  <script src="popup.js"></script>
</body>

</html>
