<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScrollHide</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --border: #f0f0f0;
      --label: #444;
      --slider-bg: #ccc;
      --accent: #007aff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --text: #ffffff;
        --border: #2c2c2e;
        --label: #ebebf5;
        --slider-bg: #323234;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 200px;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .label {
      font-size: 14px;
      color: var(--label);
    }

    /* Minimal Switch */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--slider-bg);
      border-radius: 20px;
      cursor: pointer;
      transition: .2s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }

    input:checked+.slider {
      background: var(--accent);
    }

    input:checked+.slider:before {
      transform: translateX(16px);
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Logo">
    <h1>ScrollHide</h1>
  </div>
  <div class="item">
    <span class="label">Hide Scrollbar</span>
    <label class="switch">
      <input type="checkbox" id="toggleScroll" aria-label="Toggle hiding scrollbar">
      <span class="slider"></span>
    </label>
  </div>
  <div id="statusText" class="status">Active</div>
  <script src="popup.js"></script>
</body>

</html>
