name: Release Chrome Extension

on:
  push:
    branches:
      - main
      - master # In case the default branch is named master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update manifest version
        id: version
        run: |
          # Dùng jq để lấy phiên bản gốc và thêm số hiệu của GitHub Action run
          BASE_VERSION=$(jq -r '.version' manifest.json)
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "Updating version from $BASE_VERSION to $NEW_VERSION"
          
          # Cập nhật manifest.json 
          jq ".version = \"$NEW_VERSION\"" manifest.json > tmp.json && mv tmp.json manifest.json
          
          # Lưu version vào biến môi trường để dùng cho bước sau
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          
          # Cập nhật file cục bộ trong worker (chỉ phục vụ cho việc nén zip)
          # Lưu ý: Nó không push ngược code này lại kho Github để tránh conflict
      
      - name: Create Zip Archives
        run: |
          # Sao lưu manifest.json gốc
          cp manifest.json manifest.orig.json
          
          # --- BUILD CHROME VERSION ---
          # Xoá các định dạng của Firefox
          jq 'del(.browser_specific_settings, .sidebar_action, .background.scripts)' manifest.orig.json > manifest.json
          zip -r extension-chrome-v${{ env.VERSION }}.zip . -x "*.git*" "*.github*" "*.vscode*" "*.hintrc" "README.md" "manifest.orig.json" "tmp.json" "build.ps1" "dist/*"
          
          # --- BUILD FIREFOX VERSION ---
          # Xoá các định dạng của Chrome
          jq 'del(.side_panel, .background.service_worker)' manifest.orig.json > manifest.json
          zip -r extension-firefox-v${{ env.VERSION }}.zip . -x "*.git*" "*.github*" "*.vscode*" "*.hintrc" "README.md" "manifest.orig.json" "tmp.json" "build.ps1" "dist/*"
          
          # Khôi phục manifest.json gốc
          mv manifest.orig.json manifest.json
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: |
            extension-chrome-v${{ env.VERSION }}.zip
            extension-firefox-v${{ env.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
