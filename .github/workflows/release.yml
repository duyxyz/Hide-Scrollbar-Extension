name: Release Chrome Extension

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update manifest versions
        id: version
        run: |
          BASE_VERSION=$(jq -r '.version' manifest.json)
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "Updating version from $BASE_VERSION to $NEW_VERSION"

          jq ".version = \"$NEW_VERSION\"" manifest.json > tmp.json && mv tmp.json manifest.json

          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Create Zip Archives
        run: |
          zip -r extension-chrome-v${{ env.VERSION }}.zip . -x "*.git*" "*.github*" "*.vscode*" "*.hintrc" "README.md" "tmp.json" "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: |
            extension-chrome-v${{ env.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
